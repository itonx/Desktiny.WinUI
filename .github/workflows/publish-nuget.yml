name: Publish Desktiny NuGet package

on:
  workflow_dispatch: # Enables the "Run workflow" button
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

env:
  # Default NuGet source; override with a secret if you push to a private feed
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  # Informational: the package targets Windows-only TFMs used in this repo
  TARGET_FRAMEWORKS: net8.0-windows10.0.19041.0;net9.0-windows10.0.19041.0;net10.0-windows10.0.19041.0

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - run: dotnet build Desktiny.WinUI
    - name: Create the package
      run: dotnet pack --configuration Release Desktiny.WinUI
    - name: NuGet login (OIDC → temp API key) # Get a short-lived NuGet API key
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }} # Recommended: use a secret like ${{ secrets.NUGET_USER }} for your nuget.org username (profile name), NOT your email address
    - name: NuGet push # Push the package
      run: dotnet nuget push */bin/Release/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json